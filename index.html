<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 工作助手 - 智能对话</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
            background: #f0f0f0;
            color: #1a1a2e;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== 顶栏 ===== */
        .topbar {
            background: #fff;
            border-bottom: 1px solid #e0e0e0;
            padding: 0 20px;
            height: 52px;
            display: flex;
            align-items: center;
            flex-shrink: 0;
            box-shadow: 0 1px 3px rgba(0,0,0,.04);
        }
        .topbar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 16px;
            color: #333;
        }
        .topbar .logo .icon {
            width: 30px; height: 30px;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 16px;
        }
        .topbar .right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
            color: #888;
        }
        .topbar .right .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #52c41a;
            display: inline-block;
            margin-right: 4px;
        }
        .topbar .right .settings-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #888;
            transition: color .2s;
        }
        .topbar .right .settings-btn:hover { color: #333; }

        /* ===== 设置弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.4);
            z-index: 500;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            width: 420px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0,0,0,.15);
            animation: modalIn .25s ease;
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(10px); } }
        .modal h2 { font-size: 18px; margin-bottom: 8px; }
        .modal p.desc { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.6; }
        .modal label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
        .modal input[type="password"], .modal input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color .2s;
            margin-bottom: 16px;
        }
        .modal input:focus { border-color: #4facfe; box-shadow: 0 0 0 3px rgba(79,172,254,.1); }
        .modal .model-select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: #fff;
            margin-bottom: 16px;
        }
        .modal .btn-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }
        .modal .btn-row button {
            padding: 8px 20px;
            border-radius: 8px;
            border: none;
            font-size: 14px;
            cursor: pointer;
            transition: all .2s;
        }
        .modal .btn-primary { background: #4facfe; color: #fff; }
        .modal .btn-primary:hover { background: #3d9bef; }
        .modal .btn-secondary { background: #f0f0f0; color: #666; }
        .modal .btn-secondary:hover { background: #e5e5e5; }
        .modal .status-msg { font-size: 12px; margin-top: 8px; min-height: 18px; }
        .modal .status-msg.ok { color: #52c41a; }
        .modal .status-msg.err { color: #ff4d4f; }

        /* ===== 对话区 ===== */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px 20px;
            background: #f7f7f8;
        }
        .chat-area::-webkit-scrollbar { width: 6px; }
        .chat-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }

        .chat-inner { max-width: 800px; margin: 0 auto; }

        /* ===== 消息气泡 ===== */
        .msg {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeIn .3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .msg.user { flex-direction: row-reverse; }

        .msg .avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }
        .msg.assistant .avatar {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #fff;
        }
        .msg.user .avatar {
            background: #e8e8e8;
            color: #666;
        }

        .msg .bubble {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.7;
            position: relative;
        }
        .msg.assistant .bubble {
            background: #fff;
            border: 1px solid #e8e8e8;
            border-bottom-left-radius: 4px;
            color: #333;
            box-shadow: 0 1px 3px rgba(0,0,0,.04);
        }
        .msg.user .bubble {
            background: #4facfe;
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .msg .bubble p { margin-bottom: 8px; }
        .msg .bubble p:last-child { margin-bottom: 0; }
        .msg .bubble code {
            background: #f0f0f0;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 13px;
            font-family: "SF Mono", "Consolas", monospace;
        }
        .msg.assistant .bubble pre {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 12px 16px;
            margin: 8px 0;
            font-size: 13px;
            font-family: "SF Mono", "Consolas", monospace;
            overflow-x: auto;
            line-height: 1.6;
        }
        .msg.assistant .bubble ul, .msg.assistant .bubble ol {
            margin: 8px 0 8px 20px;
        }
        .msg.assistant .bubble li { margin-bottom: 4px; }
        .msg.assistant .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 8px 0;
            font-size: 13px;
        }
        .msg.assistant .bubble th {
            background: #f0f0f0;
            padding: 6px 10px;
            border: 1px solid #ddd;
            text-align: left;
        }
        .msg.assistant .bubble td {
            padding: 6px 10px;
            border: 1px solid #ddd;
        }

        /* 小说内容 - 默认隐藏 */
        .novel-text {
            display: none;
            color: #8b5cf6;
            background: #f5f0ff;
            padding: 0 4px;
            border-radius: 4px;
            border-bottom: 1px dashed #c4b5fd;
            transition: all .15s;
        }
        body.novel-mode .novel-text { display: inline; }
        body.novel-mode .fake-text { display: none; }

        /* 打字动画 */
        .typing {
            display: flex;
            gap: 4px;
            align-items: center;
            padding: 8px 0;
        }
        .typing span {
            width: 6px; height: 6px;
            background: #bbb;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: .2s; }
        .typing span:nth-child(3) { animation-delay: .4s; }
        @keyframes typing {
            0%, 60%, 100% { opacity: .3; transform: translateY(0); }
            30% { opacity: 1; transform: translateY(-4px); }
        }

        /* ===== 输入区 ===== */
        .input-area {
            background: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 16px 20px 20px;
            flex-shrink: 0;
        }
        .input-inner {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .input-inner textarea {
            flex: 1;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            line-height: 1.5;
            max-height: 120px;
            transition: border-color .2s;
        }
        .input-inner textarea:focus {
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79,172,254,.1);
        }
        .input-inner textarea:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }
        .input-inner button {
            background: #4facfe;
            color: #fff;
            border: none;
            width: 44px; height: 44px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
            flex-shrink: 0;
        }
        .input-inner button:hover { background: #3d9bef; }
        .input-inner button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* ===== 模式指示器 ===== */
        .mode-indicator {
            position: fixed;
            bottom: 100px;
            right: 24px;
            background: #8b5cf6;
            color: #fff;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            opacity: 0;
            transition: opacity .25s;
            pointer-events: none;
            z-index: 200;
            user-select: none;
            box-shadow: 0 2px 12px rgba(139,92,246,.3);
        }
        .mode-indicator.show { opacity: .9; }

        /* ===== 消息时间戳 ===== */
        .msg .time {
            font-size: 11px;
            color: #bbb;
            margin-top: 4px;
            text-align: right;
        }
        .msg.assistant .time { text-align: left; }
    </style>
</head>
<body>

<!-- ===== 顶栏 ===== -->
<header class="topbar">
    <div class="logo">
        <div class="icon">✦</div>
        <span>AI 工作助手</span>
    </div>
    <div class="right">
        <span><span class="status-dot" id="statusDot"></span><span id="statusText">未配置</span></span>
        <span>|</span>
        <span id="modelDisplay">-</span>
        <span>|</span>
        <button class="settings-btn" id="settingsBtn" title="设置">⚙️</button>
    </div>
</header>

<!-- ===== 设置弹窗 ===== -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2>⚙️ 配置 DeepSeek API</h2>
        <p class="desc">
            去 <a href="https://platform.deepseek.com/api_keys" target="_blank" style="color:#4facfe;">platform.deepseek.com</a> 
            注册并创建一个 API Key，粘贴到下面即可使用。
        </p>
        <label>DeepSeek API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk-..." />
        <label>模型选择</label>
        <select class="model-select" id="modelSelect">
            <option value="deepseek-chat">deepseek-chat（推荐）</option>
            <option value="deepseek-reasoner">deepseek-reasoner（深度思考）</option>
        </select>
        <div class="btn-row">
            <button class="btn-secondary" id="modalCancel">取消</button>
            <button class="btn-primary" id="modalSave">保存</button>
        </div>
        <div class="status-msg" id="modalStatus"></div>
    </div>
</div>

<!-- ===== 对话区 ===== -->
<div class="chat-area" id="chatArea">
    <div class="chat-inner" id="chatInner">
        <!-- 消息会通过 JS 动态渲染 -->
        <div style="text-align:center;color:#bbb;font-size:13px;padding:40px 0;" id="welcomeMsg">
            上方 ⚙️ 配置 DeepSeek API Key 后即可开始对话
        </div>
    </div>
</div>

<!-- ===== 输入区 ===== -->
<div class="input-area">
    <div class="input-inner">
        <textarea rows="1" placeholder="给 AI 工作助手发送消息..." id="inputBox" disabled></textarea>
        <button id="sendBtn" disabled>➤</button>
    </div>
</div>

<!-- ===== 模式指示器 ===== -->
<div class="mode-indicator" id="indicator">
    📖 摸鱼模式
</div>

<script>
(function() {
    // ===== 状态 =====
    let apiKey = localStorage.getItem('deepseek_key') || '';
    let model = localStorage.getItem('deepseek_model') || 'deepseek-chat';
    let messages = [];
    let isLoading = false;

    // ===== 小说语料库 =====
    const NOVEL_POOL = [
        '少年盘膝坐在青石之上，感受着丹田中那一缕微弱的灵气缓缓流转。三年前他初入此境，如今终于摸到了筑基的门槛。',
        '"前辈，这天地之间的灵气……为何越来越稀薄了？"他低声问道。老者没有回答，只是指了指天际那道若隐若现的裂缝。',
        '"修炼一途，讲究的是收放自如。"老者缓缓说道，"你可知为何同是筑基境，有人能一剑开山，有人却连灵气外放都做不到？"',
        '少年轻轻抚摸着手中那柄锈迹斑斑的铁剑，剑身上隐隐有符文浮现。"总有一天，"他喃喃道，"我也要像传说中的剑仙一样，一剑可破万法。"',
        '就像积蓄灵力，不出手则已，一出手必中。',
        '好比心法运转的周天循环，稳扎稳打，一步一个脚印。',
        '就像命运的轨迹，你以为是自己选的，其实早已刻在骨子里。',
        '就像少年攥紧的那片残破布料，明明只是一角，却让他觉得握住了整座青城。',
        '就像少年顺着山间的溪流逆行而上，每一道弯都是一个境界，每一座峰都是一重天。',
        '就像青城山上那座藏经阁，你进去的时候拿了哪一层的心法，往后就只能练那一层的功夫——换不了，悔不了。',
        '当年那位老祖之所以坐化，就是因为体内灵力积累过多——不是不够用，是散不出去。老人说到这里叹了口气，端起茶杯抿了一口。',
        '就像出关的那天清晨，他站在青城山顶，看着云海翻涌。天地之间的灵气好像都在回应他——不是因为他变强了，而是他终于看懂了这方天地的规矩。',
        '他缓缓收剑入鞘，山谷间的雾气重新聚拢。没人知道方才发生了什么，只有石壁上那道三丈深的剑痕，在月光下泛着幽光。',
        '此时他并不知道，三日后的一剑，将斩开整个天穹。',
        '老人缓缓翻开泛黄的书页，上面记载的功法早已失传——不，不是失传，是不敢有人练。',
    ];

    // ===== DOM 引用 =====
    const chatArea = document.getElementById('chatArea');
    const chatInner = document.getElementById('chatInner');
    const inputBox = document.getElementById('inputBox');
    const sendBtn = document.getElementById('sendBtn');
    const settingsBtn = document.getElementById('settingsBtn');
    const modalOverlay = document.getElementById('modalOverlay');
    const apiKeyInput = document.getElementById('apiKeyInput');
    const modelSelect = document.getElementById('modelSelect');
    const modalCancel = document.getElementById('modalCancel');
    const modalSave = document.getElementById('modalSave');
    const modalStatus = document.getElementById('modalStatus');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const modelDisplay = document.getElementById('modelDisplay');
    const indicator = document.getElementById('indicator');
    const welcomeMsg = document.getElementById('welcomeMsg');

    // ===== 初始化 =====
    function init() {
        if (apiKey) {
            apiKeyInput.value = apiKey;
            modelSelect.value = model;
            enableChat(true);
        }
        updateStatusBar();

        // 设定时清掉欢迎语
        if (apiKey && messages.length === 0) {
            addWelcomeMessages();
        }
    }

    // 初始欢迎消息（含小说彩蛋）
    function addWelcomeMessages() {
        welcomeMsg.style.display = 'none';
        const now = new Date();
        const time = now.getHours() + ':' + String(now.getMinutes()).padStart(2, '0');

        // 助手欢迎
        addMessage('assistant', [
            '你好！我是你的 AI 工作助手。有什么可以帮助你的？',
            '可以问我技术问题、写代码、整理文档、分析数据，或者讨论项目方案。'
        ], time);

        // 第一条用户消息的示例回复（含小说内容）
        messages.push({ role: 'user', content: '帮我写一个 JavaScript 防抖函数' });
        const userBubble = createBubble('user', ['帮我写一个 JavaScript 防抖函数']);
        const userMsg = createMessage('user', userBubble, time);
        chatInner.appendChild(userMsg);

        const asstContent = [
            { fake: '好的，这是一个带 <code>immediate</code> 选项的防抖函数：', novel: '少年盘膝坐在青石之上，感受着丹田中那一缕微弱的灵气缓缓流转。三年前他初入此境，如今终于摸到了筑基的门槛。' },
            { fake: '使用方式也很简单，可以直接传入回调函数和延迟时间。', novel: '"前辈，这天地之间的灵气……为何越来越稀薄了？"他低声问道。老者没有回答，只是指了指天际那道若隐若现的裂缝。' },
            { fake: '如果 <code>immediate</code> 设为 <code>true</code>，会在第一次触发时立即执行，之后在延迟时间内再次触发不会执行。', novel: '"修炼一途，讲究的是收放自如。"老者缓缓说道，"你可知为何同是筑基境，有人能一剑开山，有人却连灵气外放都做不到？"' },
        ];

        const paragraphs = [];
        paragraphs.push('<pre style="background:#f8f9fa;border:1px solid #e9ecef;border-radius:6px;padding:12px 16px;margin:8px 0;font-size:13px;font-family:\'SF Mono\',\'Consolas\',monospace;overflow-x:auto;line-height:1.6;"><span style="color:#d73a49;">function</span> <span style="color:#6f42c1;">debounce</span>(fn, delay, immediate = <span style="color:#005cc5;">false</span>) {\n    <span style="color:#d73a49;">let</span> timer = <span style="color:#005cc5;">null</span>;\n    <span style="color:#d73a49;">return function</span>(...args) {\n        <span style="color:#d73a49;">const</span> callNow = immediate && !timer;\n        <span style="color:#d73a49;">if</span> (timer) clearTimeout(timer);\n        timer = setTimeout(() => {\n            timer = <span style="color:#005cc5;">null</span>;\n            <span style="color:#d73a49;">if</span> (!immediate) fn.apply(<span style="color:#005cc5;">this</span>, args);\n        }, delay);\n        <span style="color:#d73a49;">if</span> (callNow) fn.apply(<span style="color:#005cc5;">this</span>, args);\n    };\n}</pre>');

        asstContent.forEach(item => {
            paragraphs.push(`<p><span class="fake-text">${item.fake}</span><span class="novel-text">${item.novel}</span></p>`);
        });

        addMessageHTML('assistant', paragraphs.join('\n'), time);
        messages.push({ role: 'assistant', content: '好的，这是一个带 immediate 选项的防抖函数：...（含小说内容）' });

        scrollToBottom();
    }

    // ===== 消息渲染 =====
    function createMessage(role, bubbleEl, time) {
        const msg = document.createElement('div');
        msg.className = 'msg ' + role;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'assistant' ? '✦' : '👤';

        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'display:flex;flex-direction:column;';

        bubbleEl.className = 'bubble';

        const timeEl = document.createElement('div');
        timeEl.className = 'time';
        timeEl.textContent = time;

        // 组合
        const isUser = role === 'user';
        if (isUser) {
            msg.appendChild(wrapper);
            wrapper.appendChild(bubbleEl);
            wrapper.appendChild(timeEl);
            msg.appendChild(avatar);
        } else {
            msg.appendChild(avatar);
            wrapper.appendChild(bubbleEl);
            wrapper.appendChild(timeEl);
            msg.appendChild(wrapper);
        }

        return msg;
    }

    function createBubble(role, paragraphs) {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        paragraphs.forEach(p => {
            const para = document.createElement('p');
            para.innerHTML = p;
            bubble.appendChild(para);
        });
        return bubble;
    }

    function addMessage(role, paragraphs, time) {
        if (welcomeMsg) welcomeMsg.style.display = 'none';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        paragraphs.forEach(p => {
            const para = document.createElement('p');
            para.innerHTML = p;
            bubble.appendChild(para);
        });
        const msg = createMessage(role, bubble, time || getTime());
        chatInner.appendChild(msg);
        return msg;
    }

    function addMessageHTML(role, html, time) {
        if (welcomeMsg) welcomeMsg.style.display = 'none';
        const msg = document.createElement('div');
        msg.className = 'msg ' + role;

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        avatar.textContent = role === 'assistant' ? '✦' : '👤';

        const wrapper = document.createElement('div');
        wrapper.style.cssText = 'display:flex;flex-direction:column;';

        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.innerHTML = html;

        const timeEl = document.createElement('div');
        timeEl.className = 'time';
        timeEl.textContent = time || getTime();

        if (role === 'user') {
            msg.appendChild(wrapper);
            wrapper.appendChild(bubble);
            wrapper.appendChild(timeEl);
            msg.appendChild(avatar);
        } else {
            msg.appendChild(avatar);
            wrapper.appendChild(bubble);
            wrapper.appendChild(timeEl);
            msg.appendChild(wrapper);
        }

        chatInner.appendChild(msg);
        return msg;
    }

    function getTime() {
        const now = new Date();
        return String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0');
    }

    // ===== 注入小说内容到 AI 回复 =====
    function injectNovel(html) {
        // 在合适的段落末尾注入小说内容
        const paragraphs = html.split('</p>');
        if (paragraphs.length < 2) return html;

        // 选一个非代码的段落
        const candidates = [];
        paragraphs.forEach((p, i) => {
            if (!p.includes('<pre') && p.trim().length > 10) {
                candidates.push(i);
            }
        });

        if (candidates.length > 0) {
            // 随机选 1-2 个位置注入
            const count = Math.min(candidates.length, 1 + Math.floor(Math.random() * 2));
            const shuffled = [...candidates].sort(() => Math.random() - 0.5);
            for (let i = 0; i < count; i++) {
                const idx = shuffled[i];
                const novel = NOVEL_POOL[Math.floor(Math.random() * NOVEL_POOL.length)];
                const content = paragraphs[idx];
                // 在段落末尾、</p> 之前插入小说 span
                paragraphs[idx] = content + `<span class="novel-text">${novel}</span>`;
            }
        }

        return paragraphs.join('</p>');
    }

    // ===== 调用 DeepSeek API =====
    async function sendMessage(userText) {
        if (!apiKey || isLoading) return;

        isLoading = true;
        inputBox.disabled = true;
        sendBtn.disabled = true;
        sendBtn.textContent = '⋯';

        // 添加用户消息
        const time = getTime();
        addMessage('user', [userText], time);
        messages.push({ role: 'user', content: userText });
        scrollToBottom();

        // 显示打字动画
        const typingMsg = document.createElement('div');
        typingMsg.className = 'msg assistant typing-msg';
        typingMsg.innerHTML = `
            <div class="avatar">✦</div>
            <div class="bubble">
                <div class="typing"><span></span><span></span><span></span></div>
            </div>
        `;
        chatInner.appendChild(typingMsg);
        scrollToBottom();

        try {
            // 构建消息历史
            const apiMessages = messages.map(m => ({
                role: m.role,
                content: m.content
            }));

            // 系统提示
            apiMessages.unshift({
                role: 'system',
                content: '你是一个专业的AI工作助手，回答技术问题、写代码、提供建议。回答简洁专业，必要时带示例。'
            });

            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + apiKey
                },
                body: JSON.stringify({
                    model: model,
                    messages: apiMessages,
                    stream: false,
                    max_tokens: 2048,
                    temperature: 0.7
                })
            });

            // 移除打字动画
            typingMsg.remove();

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                const errMsg = errData.error?.message || `HTTP ${response.status}`;
                addMessage('assistant', ['⚠️ 请求失败：' + errMsg]);
                messages.push({ role: 'assistant', content: '[错误] ' + errMsg });
                return;
            }

            const data = await response.json();
            let reply = data.choices?.[0]?.message?.content || '（无回复）';

            // 将 Markdown 中的代码块转为 HTML
            reply = reply
                .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
                    return `<pre style="background:#f8f9fa;border:1px solid #e9ecef;border-radius:6px;padding:12px 16px;margin:8px 0;font-size:13px;font-family:'SF Mono','Consolas',monospace;overflow-x:auto;line-height:1.6;">${escapeHtml(code)}</pre>`;
                })
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br/>');

            // 注入小说内容
            reply = injectNovel(reply);

            // 包裹成段落
            const finalHtml = `<p>${reply}</p>`;

            addMessageHTML('assistant', finalHtml, getTime());
            messages.push({ role: 'assistant', content: data.choices?.[0]?.message?.content || '' });

        } catch (err) {
            typingMsg.remove();
            addMessage('assistant', ['⚠️ 网络错误：' + err.message]);
            messages.push({ role: 'assistant', content: '[错误] ' + err.message });
        } finally {
            isLoading = false;
            inputBox.disabled = false;
            sendBtn.disabled = false;
            sendBtn.textContent = '➤';
            inputBox.focus();
            scrollToBottom();
        }
    }

    function escapeHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function scrollToBottom() {
        setTimeout(() => {
            chatArea.scrollTop = chatArea.scrollHeight;
        }, 50);
    }

    // ===== 界面控制 =====
    function enableChat(enabled) {
        inputBox.disabled = !enabled;
        sendBtn.disabled = !enabled;
        if (enabled) inputBox.focus();
    }

    function updateStatusBar() {
        if (apiKey) {
            statusDot.style.background = '#52c41a';
            statusText.textContent = '已就绪';
            modelDisplay.textContent = model === 'deepseek-chat' ? 'DeepSeek Chat' : 'DeepSeek Reasoner';
        } else {
            statusDot.style.background = '#ff4d4f';
            statusText.textContent = '未配置';
            modelDisplay.textContent = '-';
        }
    }

    // ===== 事件绑定 =====

    // 设置按钮
    settingsBtn.addEventListener('click', () => {
        apiKeyInput.value = apiKey;
        modelSelect.value = model;
        modalStatus.textContent = '';
        modalOverlay.classList.add('show');
    });

    modalCancel.addEventListener('click', () => {
        modalOverlay.classList.remove('show');
    });

    modalOverlay.addEventListener('click', (e) => {
        if (e.target === modalOverlay) modalOverlay.classList.remove('show');
    });

    modalSave.addEventListener('click', () => {
        const newKey = apiKeyInput.value.trim();
        const newModel = modelSelect.value;

        if (!newKey) {
            modalStatus.className = 'status-msg err';
            modalStatus.textContent = '请输入 API Key';
            return;
        }

        if (!newKey.startsWith('sk-')) {
            modalStatus.className = 'status-msg err';
            modalStatus.textContent = 'API Key 格式不对，应该以 sk- 开头';
            return;
        }

        apiKey = newKey;
        model = newModel;
        localStorage.setItem('deepseek_key', apiKey);
        localStorage.setItem('deepseek_model', model);

        modalStatus.className = 'status-msg ok';
        modalStatus.textContent = '✅ 已保存！';

        enableChat(true);
        updateStatusBar();

        // 如果是第一次配置，添加欢迎消息
        if (messages.length === 0) {
            addWelcomeMessages();
        }

        setTimeout(() => {
            modalOverlay.classList.remove('show');
        }, 800);
    });

    // 发送
    sendBtn.addEventListener('click', () => {
        const text = inputBox.value.trim();
        if (text && !isLoading) {
            inputBox.value = '';
            inputBox.style.height = 'auto';
            sendMessage(text);
        }
    });

    inputBox.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendBtn.click();
        }
    });

    inputBox.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // ===== 空格摸鱼 =====
    let novelActive = false;
    let indicatorTimeout = null;

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
            e.preventDefault();
            if (!novelActive) {
                document.body.classList.add('novel-mode');
                indicator.classList.add('show');
                novelActive = true;
            }
        }
    });

    document.addEventListener('keyup', (e) => {
        if (e.code === 'Space') {
            document.body.classList.remove('novel-mode');
            novelActive = false;
            clearTimeout(indicatorTimeout);
            indicatorTimeout = setTimeout(() => {
                indicator.classList.remove('show');
            }, 1200);
        }
    });

    document.addEventListener('visibilitychange', () => {
        if (document.hidden) {
            document.body.classList.remove('novel-mode');
            novelActive = false;
            indicator.classList.remove('show');
        }
    });

    // 点击空白安全
    document.addEventListener('click', () => {
        document.body.classList.remove('novel-mode');
        novelActive = false;
        indicator.classList.remove('show');
    });

    // 启动
    init();
})();
</script>
</body>
</html>
